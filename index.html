<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Los Coquitos CRM</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/CSS/style.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/JS/app.js"></script>
</body>
<body>

<div class="crm-shell">

    <!-- Sidebar -->
    <aside class="crm-sidebar">

        <div class="logo text-center mb-4">
            <h3>🍕 Los Coquitos</h3>
            <small>Restaurant CRM</small>
        </div>

        <nav class="crm-nav">

            <a href="#" data-page="dashboard" class="active">
                <i class="bi bi-speedometer2"></i>
                Dashboard
            </a>

            <a href="#" data-page="orders">
                <i class="bi bi-receipt"></i>
                Orders
            </a>

            <a href="#" data-page="menu">
                <i class="bi bi-journal-text"></i>
                Menu
            </a>

            <a href="#" data-page="tables">
                <i class="bi bi-grid-3x3-gap"></i>
                Tables
            </a>

            <a href="#" data-page="customers">
                <i class="bi bi-people"></i>
                Customers
            </a>

            <a href="#" data-page="sales">
                <i class="bi bi-cash-stack"></i>
                Sales
            </a>

            <a href="#" data-page="settings">
                <i class="bi bi-gear"></i>
                Settings
            </a>

        </nav>

    </aside>

    <!-- Main -->
    <main class="crm-main">

        <header class="crm-header">

            <h2 id="page-title">
                Dashboard
            </h2>

            <div>

                <button class="btn btn-success">

                    <i class="bi bi-plus-circle"></i>

                    New Order

                </button>

            </div>

        </header>

        <div id="app-content">

        </div>

    </main>

</div>

<script src="app.js?v=2"></script>

</body>

</html>
