<div class="crm-card pos-page">
  <div class="pos-header">
    <div>
      <h3 class="fw-bold mb-1">POS / Menú</h3>
      <p class="text-muted mb-0">Selecciona una categoría, personaliza el producto y agrégalo a la orden.</p>
    </div>

    <button class="btn btn-outline-danger" onclick="clearPOSCart()">
      <i class="bi bi-trash"></i> Limpiar orden
    </button>
  </div>

  <div class="row g-4">
    <div class="col-xl-8">
      <div class="pos-toolbar">
        <div class="pos-search-wrap">
          <i class="bi bi-search"></i>
          <input
            id="posSearch"
            class="form-control"
            type="search"
            placeholder="Buscar pizza, pescado, bebida, postre..."
            autocomplete="off"
          >
        </div>

        <div id="posCategoryTabs" class="pos-category-tabs"></div>
      </div>

      <div id="posMenuGrid" class="pos-menu-grid"></div>
    </div>

    <div class="col-xl-4">
      <aside class="pos-cart">
        <div class="pos-cart-heading">
          <div>
            <span class="pos-cart-eyebrow">Orden activa</span>
            <h5 id="activeOrderLabel" class="fw-bold mb-0">Takeout</h5>
          </div>
          <span id="posCartCount" class="pos-cart-count">0</span>
        </div>

        <div id="posCartItems" class="pos-cart-items">
          <div class="pos-empty-state">
            <i class="bi bi-basket"></i>
            <p>No hay productos seleccionados.</p>
          </div>
        </div>

        <div id="posCartTotal" class="pos-cart-summary">
          <div class="d-flex justify-content-between">
            <span>Total</span>
            <strong>RD$0</strong>
          </div>
        </div>

        <div class="pos-order-note">
          <label for="orderNote" class="form-label fw-semibold">Nota general para cocina</label>
          <textarea
            id="orderNote"
            class="form-control"
            rows="2"
            placeholder="Ej.: sin cebolla, entregar primero las bebidas..."
          ></textarea>
        </div>

        <button class="btn btn-success w-100 pos-complete-btn" onclick="completePOSOrder()">
          <i class="bi bi-check-circle"></i> Completar orden
        </button>
      </aside>
    </div>
  </div>
</div>

<div class="modal fade" id="productOptionsModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content pos-modal">
      <div class="modal-header">
        <div>
          <span class="pos-modal-eyebrow">Personalizar producto</span>
          <h5 id="productOptionsTitle" class="modal-title fw-bold">Producto</h5>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <div id="productOptionsBody" class="modal-body"></div>

      <div class="modal-footer">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
        <button id="confirmProductOptions" type="button" class="btn btn-success">
          <i class="bi bi-plus-circle"></i> Agregar a la orden
        </button>
      </div>
    </div>
  </div>
</div>
