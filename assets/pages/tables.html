<div class="crm-card">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h2 class="fw-bold mb-1">🪑 Tables</h2>
            <p class="text-muted mb-0">
                Select a table, takeout, or delivery to start an order.
            </p>
        </div>

        <button class="btn btn-success page-btn" data-page="menu">
            <i class="bi bi-plus-circle"></i>
            New Takeout Order
        </button>

    </div>

    <div class="row g-3">

        <div class="col-md-3">
            <div class="table-card available text-center p-4">
                <h3>Table 1</h3>
                <p>Available</p>
                <button class="btn btn-success page-btn" data-page="menu">
                    Open Order
                </button>
            </div>
        </div>

        <div class="col-md-3">
            <div class="table-card occupied text-center p-4">
                <h3>Table 2</h3>
                <p>Occupied</p>
                <button class="btn btn-danger page-btn" data-page="menu">
                    Add Items
                </button>
            </div>
        </div>

        <div class="col-md-3">
            <div class="table-card available text-center p-4">
                <h3>Table 3</h3>
                <p>Available</p>
                <button class="btn btn-success page-btn" data-page="menu">
                    Open Order
                </button>
            </div>
        </div>

        <div class="col-md-3">
            <div class="table-card preparing text-center p-4">
                <h3>Table 4</h3>
                <p>Preparing</p>
                <button class="btn btn-warning page-btn" data-page="menu">
                    Add Items
                </button>
            </div>
        </div>

        <div class="col-md-3">
            <div class="table-card available text-center p-4">
                <h3>Table 5</h3>
                <p>Available</p>
                <button class="btn btn-success page-btn" data-page="menu">
                    Open Order
                </button>
            </div>
        </div>

        <div class="col-md-3">
            <div class="table-card available text-center p-4">
                <h3>Table 6</h3>
                <p>Available</p>
                <button class="btn btn-success page-btn" data-page="menu">
                    Open Order
                </button>
            </div>
        </div>

        <div class="col-md-3">
            <div class="table-card occupied text-center p-4">
                <h3>Take Out</h3>
                <p>Start counter order</p>
                <button class="btn btn-primary page-btn" data-page="menu">
                    New Takeout
                </button>
            </div>
        </div>

        <div class="col-md-3">
            <div class="table-card occupied text-center p-4">
                <h3>Delivery</h3>
                <p>Start delivery order</p>
                <button class="btn btn-primary page-btn" data-page="menu">
                    New Delivery
                </button>
            </div>
        </div>

    </div>

</div>
